name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  agent-lint:
    name: Agent definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run agent linter
        run: bash scripts/lint-agents.sh

  markdown-lint:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        # Configuration is in .markdownlint-cli2.jsonc, which also defines
        # ignored paths (LLM-prompt files in .claude/agents/ and examples/).

  link-check:
    name: Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Skip badge URLs (shields.io can flake) and our own workflow
          # status badge (chicken-and-egg on the very first CI run).
          args: >-
            --no-progress
            --max-concurrency 4
            --exclude '^https://img\.shields\.io/'
            --exclude '^https://github\.com/.*/actions/workflows/.*/badge\.svg$'
            './**/*.md'
          fail: true
