name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  agent-lint:
    name: Agent definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run agent linter
        run: bash scripts/lint-agents.sh

  markdown-lint:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules
        continue-on-error: false

  link-check:
    name: Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --config lychee.toml --max-concurrency 4 './**/*.md'
          fail: true
