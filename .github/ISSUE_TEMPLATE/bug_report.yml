name: バグ報告 / Bug report
description: エージェント定義・テンプレートの問題を報告する / Report a defect in an agent definition or template
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。再現に必要な情報をできるだけ書いてください。
        Thanks for the report. Please include enough info to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: 問題の概要 / Summary
      description: 何が起きたかを 1〜3 行で / What went wrong, in 1–3 lines
      placeholder: 例：competitor-analyst が WebFetch を呼び出せず「権限がありません」エラーで停止する
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: 該当エージェント / Affected agent
      description: 該当するエージェントがあれば / Pick the agent if relevant
      options:
        - (該当なし / N/A)
        - cfo
        - cto
        - clo
        - cmo
        - cpo
        - cro
        - cso
        - ciso
        - code-reviewer
        - competitor-analyst
        - content-writer
        - contract-drafter
        - grant-researcher
        - (template / settings.json.template / examples / README / その他)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順 / Steps to reproduce
      description: |
        1. ...
        2. ...
        3. ...
      placeholder: |
        1. CLAUDE.md を埋めて Claude Code を起動
        2. `@competitor-analyst 主要 SaaS の比較表を作って` と入力
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待した挙動 / Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動 / Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境 / Environment
      description: |
        - Claude Code バージョン / version
        - OS
        - リポジトリのバージョン（タグ or コミット） / repo version (tag or commit)
      placeholder: |
        - Claude Code: 1.x.x
        - OS: macOS 15 / Windows 11 / Ubuntu 24.04
        - Repo: v1.0.2
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足 / Additional context
      description: ログ・スクリーンショットなど。**機微情報を貼らないでください** / **Do not paste sensitive info**
    validations:
      required: false
